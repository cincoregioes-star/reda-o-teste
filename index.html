<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redação ENEM Teste Grátis - Gabarito Max</title>

<style>
:root{--card:#11141b;--card2:#171b24;--blue:#00f3ff;--pink:#ff00e6;--green:#39ff14;--red:#ff003c;--yellow:#ffd400;--muted:#cfcfcf;--line:rgba(255,255,255,.08);--lock:#6b7280}
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
body{background:#000;color:#fff;min-height:100vh;padding:20px 12px 40px;text-align:center;overflow-x:hidden}
header{max-width:1100px;margin:0 auto 24px;border:2px solid var(--blue);border-radius:24px;padding:22px 16px;background:linear-gradient(180deg,#0c0f16,#090b11);box-shadow:0 0 22px rgba(0,243,255,.22)}
header h1{color:var(--blue);font-size:clamp(2rem,4vw,3rem);text-shadow:0 0 14px rgba(0,243,255,.7);font-weight:900}
header p{margin-top:10px;color:var(--pink);font-weight:800;font-size:clamp(1rem,2vw,1.3rem)}
#app{width:100%;max-width:1100px;margin:0 auto}
.box{width:100%;background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--line);border-radius:20px;padding:20px 16px;box-shadow:0 0 20px rgba(0,0,0,.35);overflow:hidden}
.btn{display:block;width:100%;max-width:620px;margin:10px auto;padding:14px 16px;border:2px solid var(--blue);background:transparent;color:#fff;border-radius:12px;cursor:pointer;font-weight:800;font-size:1rem;line-height:1.45;transition:.2s;white-space:normal;word-break:break-word}
.btn:hover:not(:disabled){background:var(--blue);color:#000;box-shadow:0 0 18px rgba(0,243,255,.35)}
.btn-lock{border-color:var(--lock);color:#d1d5db;background:rgba(255,255,255,.03)}
.btn-lock:hover{background:rgba(255,255,255,.08);color:#fff;box-shadow:none}
.btn-premium{border-color:var(--yellow);color:var(--yellow)}
.btn-premium:hover:not(:disabled){background:var(--yellow);color:#000;box-shadow:0 0 18px rgba(255,212,0,.35)}
.btn-voltar{border-color:#666;color:#ddd}
.btn-voltar:hover:not(:disabled){background:#333;color:#fff;box-shadow:none}
.btn-next{border-color:var(--pink);color:#fff;background:linear-gradient(135deg,rgba(255,0,230,.18),rgba(0,243,255,.08))}
.btn-next:hover:not(:disabled){background:var(--pink);color:#000}
.btn.correct{background:var(--green)!important;border-color:var(--green)!important;color:#000!important}
.btn.wrong{background:var(--red)!important;border-color:var(--red)!important;color:#fff!important}
.grid-areas{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:18px}
.card-area{background:linear-gradient(135deg,rgba(0,243,255,.08),rgba(255,0,230,.08));border:1px solid rgba(0,243,255,.16);border-radius:16px;padding:16px;text-align:left}
.card-area.locked{background:linear-gradient(135deg,rgba(107,114,128,.10),rgba(55,65,81,.12));border-color:rgba(107,114,128,.25)}
.card-area h3{color:var(--blue);margin-bottom:8px;font-size:1.12rem}
.card-area.locked h3{color:#d1d5db}
.card-area p{color:#ddd;font-size:.95rem;line-height:1.45;margin-bottom:10px}
.status{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:18px;color:var(--pink);font-weight:bold;text-align:left}
#question-text{font-size:1.05rem;line-height:1.6;margin:20px 0;min-height:88px;text-align:left;word-break:break-word}
.question-label{display:block;color:var(--yellow);font-weight:bold;margin-bottom:8px}
.text-base{display:block;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px;margin:10px 0 14px;color:#f5f5f5;font-style:italic;line-height:1.65}
.options-wrap{display:flex;flex-direction:column;gap:12px;margin-bottom:16px}
.option-btn{width:100%;max-width:100%;margin:0;text-align:left;min-height:58px}
.comment-box{display:none;text-align:left;margin-top:14px;padding:14px;border-radius:12px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);line-height:1.55;color:#eee}
.result-number{font-size:3rem;color:var(--blue);margin:12px 0;font-weight:900}
.result-sub{font-size:1.12rem;color:#ddd;margin-bottom:10px}
.mini{color:var(--muted);font-size:.96rem;line-height:1.5}
.lock-box{max-width:780px;margin:0 auto;background:linear-gradient(135deg,rgba(255,212,0,.10),rgba(255,0,230,.10));border:1px solid rgba(255,212,0,.25);border-radius:20px;padding:28px 18px;box-shadow:0 0 20px rgba(255,212,0,.12)}
.lock-box h2{color:var(--yellow);font-size:2rem;margin-bottom:14px}
.lock-box p{color:#f3f4f6;line-height:1.6;margin-bottom:12px}
@media(max-width:700px){.grid-areas{grid-template-columns:1fr}.box{padding:16px 12px}#question-text{font-size:1rem}.btn{font-size:.96rem;padding:13px 12px}}
</style>
</head>

<body>

<header>
<h1>REDAÇÃO ENEM TESTE GRÁTIS</h1>
<p>2 MÓDULOS LIBERADOS • 10 QUESTÕES CADA • RESTANTE BLOQUEADO</p>
</header>

<div id="app"></div>

<audio id="audio-bg" loop preload="auto" playsinline>
<source src="https://cdn.pixabay.com/download/audio/2022/01/18/audio_d0a13f69d2.mp3?filename=tension-103701.mp3" type="audio/mpeg">
</audio>
<audio id="audio-correct" preload="auto" playsinline>
<source src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_0625c1539c.mp3?filename=success-1-6297.mp3" type="audio/mpeg">
</audio>
<audio id="audio-wrong" preload="auto" playsinline>
<source src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_c6ccf3232f.mp3?filename=error-126627.mp3" type="audio/mpeg">
</audio>

<script>
const PREMIUM_URL="COLE_AQUI_O_LINK_PREMIUM_REDAÇÃO";

const app=document.getElementById("app");
const audioBg=document.getElementById("audio-bg");
const audioCorrect=document.getElementById("audio-correct");
const audioWrong=document.getElementById("audio-wrong");

audioBg.volume=.025;
audioCorrect.volume=.55;
audioWrong.volume=.55;

let audioLiberado=false;
let areaAtual="";
let questoesAtuais=[];
let indiceQuestao=0;
let acertosObjetivas=0;
let questaoRenderizadaAtual=null;
let travado=false;

document.addEventListener("click",destravarAudio,{once:true});
document.addEventListener("touchstart",destravarAudio,{once:true});

function destravarAudio(){
 if(audioLiberado)return Promise.resolve(true);
 audioBg.muted=true;
 return audioBg.play().then(()=>{
  audioBg.pause();audioBg.currentTime=0;audioBg.muted=false;audioLiberado=true;
  audioCorrect.play().then(()=>{audioCorrect.pause();audioCorrect.currentTime=0}).catch(()=>{});
  audioWrong.play().then(()=>{audioWrong.pause();audioWrong.currentTime=0}).catch(()=>{});
  return true;
 }).catch(()=>false);
}
function tocarAudioFundo(){if(!audioLiberado)return;audioBg.currentTime=0;audioBg.play().catch(()=>{})}
function pararAudioFundo(){audioBg.pause();audioBg.currentTime=0}
function tocarAcerto(){audioCorrect.currentTime=0;audioCorrect.play().catch(()=>{})}
function tocarErro(){audioWrong.currentTime=0;audioWrong.play().catch(()=>{})}

const areas=[
{nome:"Introdução à Redação ENEM",descricao:"Módulo liberado no teste grátis.",liberada:true},
{nome:"Interpretação de Tema",descricao:"Módulo liberado no teste grátis.",liberada:true},
{nome:"Introdução Perfeita",descricao:"Disponível apenas na versão premium.",liberada:false},
{nome:"Argumentação 1",descricao:"Disponível apenas na versão premium.",liberada:false},
{nome:"Argumentação 2",descricao:"Disponível apenas na versão premium.",liberada:false},
{nome:"Repertório Sociocultural",descricao:"Disponível apenas na versão premium.",liberada:false},
{nome:"Coesão e Coerência",descricao:"Disponível apenas na versão premium.",liberada:false},
{nome:"Proposta de Intervenção",descricao:"Disponível apenas na versão premium.",liberada:false},
{nome:"Erros que Zeram Redação",descricao:"Disponível apenas na versão premium.",liberada:false},
{nome:"Redação Nota 1000",descricao:"Disponível apenas na versão premium.",liberada:false},
{nome:"Temas ENEM",descricao:"Disponível apenas na versão premium.",liberada:false},
{nome:"Simulado Completo de Redação",descricao:"Disponível apenas na versão premium.",liberada:false}
];

function criarObjetiva(area,numero,base,q,o,c,coment){
 return{tipo:"objetiva",area,numero,base,q,o,c,coment};
}
function gerarAreaBase(nomeArea,lista){
 return lista.map((item,i)=>criarObjetiva(nomeArea,i+1,item.base,item.q,item.o,item.c,item.coment));
}
function embaralharAlternativas(questao){
 const pares=questao.o.map((texto,idx)=>({texto,correta:idx===questao.c}));
 for(let i=pares.length-1;i>0;i--){
  const j=Math.floor(Math.random()*(i+1));
  [pares[i],pares[j]]=[pares[j],pares[i]];
 }
 return{...questao,opcoesRenderizadas:pares.map(p=>p.texto),corretaRenderizada:pares.findIndex(p=>p.correta)};
}

const bancoQuestoes={
"Introdução à Redação ENEM":gerarAreaBase("Introdução à Redação ENEM",[
{base:"A redação do ENEM cobra um texto com defesa de ponto de vista.",q:"Qual é o tipo textual exigido na redação do ENEM?",o:["Narrativo","Dissertativo-argumentativo","Poético","Carta pessoal"],c:1,coment:"O ENEM exige texto dissertativo-argumentativo, com tese e argumentos."},
{base:"A redação é corrigida por cinco competências.",q:"Quantas competências formam a correção da redação?",o:["3","4","5","6"],c:2,coment:"São cinco competências, cada uma valendo até 200 pontos."},
{base:"A nota máxima da redação é muito valorizada no ENEM.",q:"Qual é a pontuação máxima da redação?",o:["500 pontos","800 pontos","1000 pontos","1200 pontos"],c:2,coment:"A redação do ENEM vale até 1000 pontos."},
{base:"A proposta apresenta um problema social brasileiro.",q:"A redação deve tratar principalmente de:",o:["Tema livre","Tema social proposto","Experiência pessoal sem análise","Resumo dos textos motivadores"],c:1,coment:"O texto precisa discutir o tema social proposto pela prova."},
{base:"A estrutura ajuda o corretor a entender o projeto de texto.",q:"Qual estrutura é mais adequada?",o:["Introdução, desenvolvimento e conclusão","Somente conclusão","Lista de frases","Apenas opinião"],c:0,coment:"A estrutura mais segura é introdução, desenvolvimento e conclusão."},
{base:"A tese apresenta o posicionamento central do candidato.",q:"Onde a tese costuma aparecer?",o:["Na introdução","No título apenas","Depois da proposta de intervenção","Fora do texto"],c:0,coment:"A tese normalmente aparece na introdução."},
{base:"A Competência 1 avalia o domínio da norma-padrão.",q:"Qual linguagem deve ser usada?",o:["Formal","Com gírias","Internetês","Abreviada"],c:0,coment:"A linguagem deve ser formal e adequada à norma-padrão."},
{base:"A Competência 5 avalia a solução proposta.",q:"Qual competência avalia a proposta de intervenção?",o:["Competência 1","Competência 2","Competência 3","Competência 5"],c:3,coment:"A proposta de intervenção é avaliada na Competência 5."},
{base:"O texto precisa defender uma ideia.",q:"O principal objetivo do texto dissertativo-argumentativo é:",o:["Convencer com argumentos","Apenas narrar uma história","Fazer poesia","Copiar a coletânea"],c:0,coment:"O texto deve defender uma tese com argumentos."},
{base:"A conclusão fecha o raciocínio.",q:"A conclusão deve apresentar:",o:["Nova tese sem ligação","Proposta de intervenção","Cópia da introdução","Tema diferente"],c:1,coment:"A conclusão deve apresentar intervenção para o problema."}
]),

"Interpretação de Tema":gerarAreaBase("Interpretação de Tema",[
{base:"Antes de escrever, é preciso entender a frase-tema.",q:"Qual é o primeiro passo?",o:["Escrever imediatamente","Interpretar o tema","Copiar a coletânea","Ignorar o comando"],c:1,coment:"Interpretar o tema evita fuga e tangenciamento."},
{base:"Fuga ao tema ocorre quando o texto abandona o assunto proposto.",q:"Fuga ao tema significa:",o:["Abordar corretamente","Ignorar o tema","Explicar bem","Argumentar com clareza"],c:1,coment:"Fugir do tema pode zerar a redação."},
{base:"As palavras-chave mostram o recorte da proposta.",q:"Palavras-chave servem para:",o:["Confundir","Orientar o texto","Enfeitar a frase","Serem ignoradas"],c:1,coment:"Elas mostram o caminho correto da redação."},
{base:"A redação do ENEM trabalha problemas coletivos.",q:"Tema social exige:",o:["Opinião individual sem análise","Visão coletiva","História fictícia","Poema"],c:1,coment:"O tema deve ser analisado como problema social."},
{base:"A coletânea apresenta pistas do recorte temático.",q:"A coletânea:",o:["Define uma resposta pronta","Ajuda a interpretação","Substitui o texto","Deve ser ignorada"],c:1,coment:"Ela ajuda a entender o tema, mas não deve ser copiada."},
{base:"Tangenciar é tratar apenas parte do assunto.",q:"Tangenciar o tema é:",o:["Fugir totalmente","Abordar parcialmente","Acertar tudo","Copiar bem"],c:1,coment:"O tangenciamento reduz muito a nota."},
{base:"O tema exige leitura cuidadosa.",q:"Para compreender o tema, é necessário:",o:["Decoreba","Interpretação","Chute","Resumo solto"],c:1,coment:"Interpretar bem é a base da redação."},
{base:"O candidato não escolhe o tema.",q:"O tema deve ser:",o:["Ignorado","Seguido fielmente","Mudado","Criado pelo aluno"],c:1,coment:"É obrigatório seguir o tema proposto."},
{base:"Um erro comum é falar de assunto parecido, mas fora do recorte.",q:"Qual é um erro comum?",o:["Interpretar bem","Fugir do tema","Argumentar","Ler a coletânea"],c:1,coment:"Falar de assunto parecido pode ser fuga parcial ou total."},
{base:"A tese nasce da compreensão do tema.",q:"O tema define a tese?",o:["Sim","Não","Pouco","Nunca"],c:0,coment:"A tese deve responder diretamente ao tema."}
])
};

function irParaPremium(){
 window.location.href=PREMIUM_URL;
}

function mostrarMenu(){
 pararAudioFundo();
 app.innerHTML=`
 <div class="box">
 <h2 style="color:var(--blue);margin-bottom:8px;">Escolha um módulo de Redação</h2>
 <p class="mini">No teste grátis você libera <strong>2 módulos</strong>. Os demais ficam bloqueados para a versão completa.</p>
 <div class="grid-areas">
 ${areas.map(area=>`
 <div class="card-area ${area.liberada?"":"locked"}">
 <h3>${area.liberada?area.nome:"🔒 "+area.nome}</h3>
 <p>${area.descricao}</p>
 <button class="btn ${area.liberada?"":"btn-lock"}" onclick="${area.liberada?`iniciarArea('${area.nome.replace(/'/g,"\\'")}')`:`mostrarBloqueio()`}">
 ${area.liberada?"Entrar neste módulo":"Desbloquear no premium"}
 </button>
 </div>`).join("")}
 </div>
 </div>`;
}

function mostrarBloqueio(){
 pararAudioFundo();
 app.innerHTML=`
 <div class="lock-box">
 <h2>🔒 MÓDULO PREMIUM</h2>
 <p>Esse módulo está disponível apenas na versão completa do Simulado Redação ENEM.</p>
 <p>No premium você desbloqueia os 12 módulos, 300 questões e treinamento completo.</p>
 <button class="btn btn-premium" onclick="irParaPremium()">LIBERAR ACESSO COMPLETO</button>
 <button class="btn btn-voltar" onclick="mostrarMenu()">VOLTAR AO MENU</button>
 </div>`;
}

async function iniciarArea(nomeArea){
 await destravarAudio();
 areaAtual=nomeArea;
 questoesAtuais=bancoQuestoes[nomeArea]||[];
 indiceQuestao=0;
 acertosObjetivas=0;
 questaoRenderizadaAtual=null;
 travado=false;

 if(!questoesAtuais.length){
  app.innerHTML=`<div class="box"><h2 style="color:var(--red);">Erro ao abrir o módulo</h2><button class="btn btn-voltar" onclick="mostrarMenu()">Voltar ao menu</button></div>`;
  return;
 }

 setTimeout(()=>{tocarAudioFundo()},120);
 carregarQuestao();
}

function montarEnunciado(questao){
 return`
 <span class="question-label">Base para resolução:</span>
 <span class="text-base">${questao.base}</span>
 <span class="question-label">Pergunta:</span>
 ${questao.q}`;
}

function carregarQuestao(){
 travado=false;
 const questao=questoesAtuais[indiceQuestao];
 const total=questoesAtuais.length;
 questaoRenderizadaAtual=embaralharAlternativas(questao);

 let html=`
 <div class="box">
 <div class="status">
 <span>${areaAtual}</span>
 <span>Questão ${indiceQuestao+1}/${total}</span>
 </div>
 <div id="question-text">${montarEnunciado(questaoRenderizadaAtual)}</div>
 <div class="options-wrap">`;

 questaoRenderizadaAtual.opcoesRenderizadas.forEach((alt,idx)=>{
  html+=`<button class="btn option-btn" onclick="responderObjetiva(${idx})">${alt}</button>`;
 });

 html+=`
 </div>
 <div id="comentario" class="comment-box"></div>
 <button id="btn-proxima" class="btn btn-next" style="display:none" onclick="proximaQuestao()">Próxima pergunta</button>
 <button class="btn btn-voltar" onclick="mostrarMenu()">Voltar ao menu</button>
 </div>`;

 app.innerHTML=html;
}

function responderObjetiva(escolhida){
 if(travado)return;
 travado=true;

 const botoes=document.querySelectorAll(".option-btn");
 const correta=questaoRenderizadaAtual.corretaRenderizada;
 const comentario=document.getElementById("comentario");
 const btnProxima=document.getElementById("btn-proxima");

 botoes.forEach((btn,idx)=>{
  btn.disabled=true;
  if(idx===correta)btn.classList.add("correct");
 });

 if(escolhida===correta){
  acertosObjetivas++;
  tocarAcerto();
  comentario.innerHTML=`<strong style="color:var(--green);">Resposta correta.</strong><br>${questaoRenderizadaAtual.coment}`;
 }else{
  if(botoes[escolhida])botoes[escolhida].classList.add("wrong");
  tocarErro();
  comentario.innerHTML=`<strong style="color:var(--red);">Resposta incorreta.</strong><br>${questaoRenderizadaAtual.coment}`;
 }

 comentario.style.display="block";
 btnProxima.style.display="block";
}

function proximaQuestao(){
 indiceQuestao++;
 if(indiceQuestao<questoesAtuais.length){
  carregarQuestao();
 }else{
  finalizarArea();
 }
}

function finalizarArea(){
 pararAudioFundo();

 const notaFinal=acertosObjetivas*20;
 const totalPossivel=200;
 let feedback="Você concluiu uma amostra do treinamento de Redação ENEM. A versão completa possui 12 módulos e 300 questões.";

 if(notaFinal>=160)feedback+=" Excelente começo. Você já pode avançar para o premium.";
 else if(notaFinal>=100)feedback+=" Bom começo. No premium você reforça os pontos fracos.";
 else feedback+=" Esse teste mostrou onde melhorar. O premium ajuda a evoluir com treino completo.";

 app.innerHTML=`
 <div class="box">
 <h2 style="color:var(--blue);">${areaAtual}</h2>
 <div class="result-number">${notaFinal}/${totalPossivel}</div>
 <div class="result-sub">Acertos: ${acertosObjetivas}/10</div>
 <p class="mini" style="margin-bottom:18px;">${feedback}</p>

 <button class="btn btn-premium" onclick="irParaPremium()">DESBLOQUEAR VERSÃO COMPLETA</button>
 <button class="btn" onclick="iniciarArea('${areaAtual.replace(/'/g,"\\'")}')">Refazer este módulo</button>
 <button class="btn btn-voltar" onclick="mostrarMenu()">Voltar ao menu</button>
 </div>`;
}

mostrarMenu();
</script>

</body>
</html>
